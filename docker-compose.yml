services:
  backend:
    build: ./backend
    container_name: book-gen-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - graph-state:/data
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: book-gen-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_SUPABASE_URL: ${SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    depends_on:
      - backend

volumes:
  graph-state:
